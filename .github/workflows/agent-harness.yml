# Agent Harness CI check. Generated by company-agent-harness v0.4.0.
# Runs documentation + architecture guardrails on every PR. Tune as needed.
name: agent-harness

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Validate docs, config, and architecture boundaries.
      - name: Harness verify
        run: npx --yes company-agent-harness verify
      # Evaluate the deterministic rule scenarios (.agent-harness.yml eval.scenarios).
      - name: Harness eval
        run: npx --yes company-agent-harness eval
      # Optional: run the repo's full verification (lint/typecheck/test/build).
      - name: Project verification
        run: sh scripts/agent-harness/agent-verify
