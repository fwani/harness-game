# Agent Harness CI check. Generated by company-agent-harness v0.4.0.
# Runs documentation + architecture guardrails on every PR. Tune as needed.
name: agent-harness

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # The harness tool is published as a git package, not on npm.
      - name: Install agent-harness
        run: npm install -g https://github.com/fwani/agent-harness.git
      # Validate docs, config, and architecture boundaries.
      - name: Harness verify
        run: agent-harness verify
      # Evaluate the deterministic rule scenarios (.agent-harness.yml eval.scenarios).
      - name: Harness eval
        run: agent-harness eval
      # Install project dependencies for the verification step below.
      - name: Install deps
        run: npm ci
      # Run the repo's full verification (lint/typecheck/test/build).
      - name: Project verification
        run: sh scripts/agent-harness/agent-verify
